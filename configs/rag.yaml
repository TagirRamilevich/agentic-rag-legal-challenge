architecture_summary: "BM25(top-12)+neighbor±1 → cross-encoder rerank(top-5) → Claude Haiku extraction. Dual-query for comparison questions. Law-identity+article page priority."

retrieval:
  top_k_bm25: 15
  top_k_rerank: 5
  neighbor_pages: true
  use_reranker: true
