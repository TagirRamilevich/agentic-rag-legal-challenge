phase: warmup
docs_dir: docs_corpus
data_dir: data
cache_dir: .cache
submission_path: submission.json
code_archive_path: code_archive.zip
architecture_summary: "BM25(top-20) + cross-encoder rerank(top-5) + Claude Haiku extraction. Phase-scoped corpus, 1-based PDF pages, deterministic fallback."

retrieval:
  top_k_bm25: 20
  top_k_rerank: 5
  neighbor_pages: true
  use_reranker: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

llm:
  use_llm: true

chunking:
  enabled: false          # set true to split pages into overlapping chunks
  chunk_tokens: 400
  overlap_tokens: 100

answering:
  free_text_fallback: "There is no information on this question in the provided documents."

ingestion:
  ocr_dpi: 300
  min_page_text_chars: 50
